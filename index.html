<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFE WORKS — 仕事と暮らしのツール集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 class="logo">LIFE<span>WORKS</span></h1>
      <p class="tagline">ちょっと笑えて、わりと使える。</p>
      <p class="sub-tagline">診断・分析・改善。働く人と家族のためのツール集。</p>
    </header>

    <section class="category">
      <h2 class="category-label">💼 仕事・職場</h2>
      <div class="app-grid">
        <a href="/jigoku-shindan/" class="app-card" style="--accent: #ff4444">
          <div class="card-accent"></div>
          <div class="card-body">
            <div class="app-icon">🔥</div>
            <div class="app-text">
              <p class="app-name">職場 地獄度診断</p>
              <p class="app-desc">10問に答えるだけ。あなたの職場の地獄レベルを判定します。</p>
            </div>
            <span class="arrow">→</span>
          </div>
        </a>
        <a href="/ai-taigai/" class="app-card" style="--accent: #00c8ff">
          <div class="card-accent"></div>
          <div class="card-body">
            <div class="app-icon">🤖</div>
            <div class="app-text">
              <p class="app-name">AIに奪われるまであと何日？</p>
              <p class="app-desc">職種・業務を入力するとAI代替までの残り日数を診断します。</p>
            </div>
            <span class="arrow">→</span>
          </div>
        </a>
      </div>
    </section>

    <section class="category">
      <h2 class="category-label">🏠 家庭・暮らし</h2>
      <div class="app-grid">
        <div class="app-card coming-soon" style="--accent: #a78bfa">
          <div class="card-accent"></div>
          <div class="card-body">
            <div class="app-icon">🔜</div>
            <div class="app-text">
              <p class="app-name">近日公開予定</p>
              <p class="app-desc">家庭・暮らし系のツールを準備中です。</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 LIFE WORKS</p>
    </footer>
  </div>
</body>
</html>
