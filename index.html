<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFE WORKS — 仕事と暮らしのツール集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">LIFE<span>WORKS</span></a>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero-title">ちょっと笑えて、<br>わりと使える。</h1>
    <p class="hero-sub">診断・分析・改善。働く人と家族のためのツール集。</p>
  </section>

  <main class="container">

    <section class="category">
      <h2 class="category-label">仕事・職場</h2>
      <div class="app-grid">

        <a href="/jigoku-shindan/" class="app-card">
          <div class="card-image" style="--card-color: #ff4444">
            <!-- 画像が入ります -->
          </div>
          <div class="card-body">
            <p class="app-name">職場 地獄度診断</p>
            <p class="app-desc">10問に答えるだけ。あなたの職場の地獄レベルを判定します。</p>
            <span class="card-cta">使ってみる →</span>
          </div>
        </a>

        <a href="/ai-taigai/" class="app-card">
          <div class="card-image" style="--card-color: #0099dd">
            <!-- 画像が入ります -->
          </div>
          <div class="card-body">
            <p class="app-name">AIに奪われるまであと何日？</p>
            <p class="app-desc">職種・業務を入力するとAI代替までの残り日数を診断します。</p>
            <span class="card-cta">使ってみる →</span>
          </div>
        </a>

      </div>
    </section>

    <section class="category">
      <h2 class="category-label">家庭・暮らし</h2>
      <div class="app-grid">

        <div class="app-card coming-soon">
          <div class="card-image" style="--card-color: #aaa">
          </div>
          <div class="card-body">
            <p class="app-name">近日公開予定</p>
            <p class="app-desc">家庭・暮らし系のツールを準備中です。</p>
          </div>
        </div>

      </div>
    </section>

  </main>

  <footer class="footer">
    <p>© 2026 LIFE WORKS</p>
  </footer>

</body>
</html>
