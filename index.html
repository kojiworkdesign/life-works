<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFE WORKS — 仕事と暮らしのツール集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 class="logo">LIFE WORKS</h1>
      <p class="tagline">仕事と暮らしを、ちょっとだけ面白くするツール集</p>
    </header>

    <section class="category">
      <h2 class="category-title">💼 仕事・職場</h2>
      <div class="app-grid">
        <a href="/jigoku-shindan/" class="app-card">
          <div class="app-icon">🔥</div>
          <div class="app-info">
            <p class="app-name">職場 地獄度診断</p>
            <p class="app-desc">10問に答えるだけ。あなたの職場の地獄レベルを判定します。</p>
          </div>
        </a>
        <a href="/ai-taigai/" class="app-card">
          <div class="app-icon">🤖</div>
          <div class="app-info">
            <p class="app-name">AIに奪われるまであと何日？</p>
            <p class="app-desc">職種・業務を入力するとAIに代替されるまでの日数を診断します。</p>
          </div>
        </a>
      </div>
    </section>

    <section class="category">
      <h2 class="category-title">🏠 家庭・暮らし</h2>
      <div class="app-grid coming-soon-grid">
        <div class="app-card coming-soon">
          <div class="app-icon">🔜</div>
          <div class="app-info">
            <p class="app-name">近日公開予定</p>
            <p class="app-desc">家庭・暮らし系のツールを準備中です。</p>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 LIFE WORKS</p>
    </footer>
  </div>
</body>
</html>
