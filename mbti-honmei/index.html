<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相手の本心、MBTIで見抜く | LIFE WORKS</title>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="LIFE WORKS">
  <meta property="og:title" content="相手の本心、MBTIで見抜く | LIFE WORKS">
  <meta property="og:description" content="発言・チャットを貼り付けると、16タイプそれぞれの本心を分析します。">
  <meta property="og:url" content="https://life-works.net/mbti-honmei/">
  <meta property="og:image" content="https://life-works.net/mbti-honmei/ogp.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://life-works.net/mbti-honmei/ogp.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="app-nav"><a href="/" class="back-home">← LIFE WORKS</a></nav>
    <header>
      <h1 class="title">相手の本心、<br>MBTIで見抜く</h1>
      <p class="subtitle">発言・チャットを貼り付けると、16タイプそれぞれの本心を分析します</p>
    </header>

    <form id="form">
      <div class="field">
        <label class="field-label">相手との関係性</label>
        <div class="rel-buttons">
          <button type="button" class="rel-btn" data-value="上司">上司</button>
          <button type="button" class="rel-btn" data-value="部下・後輩">部下・後輩</button>
          <button type="button" class="rel-btn" data-value="同僚">同僚</button>
          <button type="button" class="rel-btn" data-value="取引先・クライアント">取引先</button>
          <button type="button" class="rel-btn" data-value="恋人・パートナー">恋人・パートナー</button>
          <button type="button" class="rel-btn" data-value="友人">友人</button>
          <button type="button" class="rel-btn" data-value="other">その他</button>
        </div>
        <input type="text" id="relOther" class="rel-other hidden" placeholder="関係性を入力してください">
      </div>

      <div class="field">
        <label class="field-label">相手の発言・チャット内容</label>
        <textarea id="message" rows="5" placeholder="相手の発言、メール、チャットの内容を貼り付けてください..." maxlength="500" required></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn" disabled>🔍 本心を分析する</button>
    </form>

    <div id="result" class="result hidden">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>16タイプの本心を分析中...<br>少々お待ちください</p>
      </div>
      <div id="resultContent" class="result-content hidden">
        <p class="result-intro" id="resultIntro"></p>
        <div id="groupsContainer"></div>
        <div class="note-cta">
          <p class="note-cta-text">職場の人間関係をMBTIで読み解く方法、noteに書いています</p>
          <a href="https://note.com/koji_workdesign/n/n6d575819beab" class="note-cta-link" target="_blank" rel="noopener">noteを読む →</a>
        </div>
        <div class="share-area">
          <p class="share-label">結果をシェア</p>
          <a id="tweetBtn" href="#" target="_blank" class="tweet-btn">𝕏 でシェア</a>
        </div>
        <div class="note-banner">
          <a href="https://note.com/koji_workdesign/n/n6d575819beab" target="_blank" rel="noopener">
            <img src="../images/note-banner.png" alt="非エンジニアの私がClaude CodeだけでWebアプリを作った話" style="width:100%;border-radius:8px;display:block;">
          </a>
        </div>
        <button class="retry-btn" onclick="location.reload()">もう一度分析する</button>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
